name: Build and Draft Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'opis releasea'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Nuitka
        run: pip install nuitka

      - name: Build Zad1
        run: |
          python -m nuitka --assume-yes-for-downloads --onefile --lto=yes --output-dir=build1 projects/Zad1-AlgorytmySortowania/sortowator.py
          Move-Item build1/sortowator.exe Zad1-AlgorytmySortowania-Windows.exe
          
      - name: Build Zad2
        run: |
          python -m nuitka --assume-yes-for-downloads --onefile --lto=yes --output-dir=build2 projects/Zad2-ZlozoneStrukturyDanych/main.py
          Move-Item build2/main.exe Zad2-ZlozoneStrukturyDanych-Windows.exe
          
      - name: Build Zad3
        run: |
          python -m nuitka --assume-yes-for-downloads --onefile --lto=yes --output-dir=build3 projects/Zad3-AlgorytmyGrafowe/main.py
          Move-Item build3/main.exe Zad3-AlgorytmyGrafowe-Windows.exe
          
      - name: Build Zad4
        run: |
          python -m nuitka --assume-yes-for-downloads --onefile --lto=yes --output-dir=build4 projects/Zad4-AlgorytmyZPowracaniem/main.py
          Move-Item build4/main.exe Zad4-AlgorytmyZPowracaniem-Windows.exe
          
      - name: Upload Windows Binaries
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            Zad1-AlgorytmySortowania-Windows.exe
            Zad2-ZlozoneStrukturyDanych-Windows.exe
            Zad3-AlgorytmyGrafowe-Windows.exe
            Zad4-AlgorytmyZPowracaniem-Windows.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Nuitka
        run: pip install nuitka
        
      - name: Build Zad1
        run: |
          python -m nuitka --assume-yes-for-downloads --onefile --lto=yes --output-dir=build1 projects/Zad1-AlgorytmySortowania/sortowator.py
          mv build1/sortowator.bin Zad1-AlgorytmySortowania-Linux
          
      - name: Build Zad2
        run: |
          python -m nuitka --assume-yes-for-downloads --onefile --lto=yes --output-dir=build2 projects/Zad2-ZlozoneStrukturyDanych/main.py
          mv build2/main.bin Zad2-ZlozoneStrukturyDanych-Linux
          
      - name: Build Zad3
        run: |
          python -m nuitka --assume-yes-for-downloads --onefile --lto=yes --output-dir=build3 projects/Zad3-AlgorytmyGrafowe/main.py
          mv build3/main.bin Zad3-AlgorytmyGrafowe-Linux
          
      - name: Build Zad4
        run: |
          python -m nuitka --assume-yes-for-downloads --onefile --lto=yes --output-dir=build4 projects/Zad4-AlgorytmyZPowracaniem/main.py
          mv build4/main.bin Zad4-AlgorytmyZPowracaniem-Linux
          
      - name: Upload Linux Binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            Zad1-AlgorytmySortowania-Linux
            Zad2-ZlozoneStrukturyDanych-Linux
            Zad3-AlgorytmyGrafowe-Linux
            Zad4-AlgorytmyZPowracaniem-Linux

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
          
      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: true
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
